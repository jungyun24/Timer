<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>출근→퇴근 달리기</title>
<style>
  body { font-family: system-ui, sans-serif; padding: 14px; width: 260px; margin:0;
         background:#fffbe6; }
  h1 { font-size: 15px; margin: 0 0 10px; }
  label { display:block; margin: 8px 0 3px; font-size: 12px; color:#444; }
  input[type=text], input[type=time], input[type=number] {
    width: 100%; padding: 4px 6px; box-sizing: border-box;
    border:1px solid #ccc; border-radius:4px; font-size:13px;
  }
  .row { display:flex; gap:8px; }
  .row > div { flex: 1; }
  .chars { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
  .chars button { font-size: 16px; padding: 3px 6px; cursor: pointer;
                  border:1px solid #ddd; background:#fff; border-radius:4px; }
  .chars button.active { background:#ffe88a; border-color:#caa400; }
  .check { display:flex; align-items:center; gap:6px; font-size:12px; margin-top:6px; }
  .saved { color: #2a8f2a; font-size: 11px; margin-top: 8px; min-height: 14px; text-align:center; }
  .preview { background:#fff; border:1px solid #eee; border-radius:6px;
             padding:6px 8px; margin-top:8px; font-size:13px; text-align:center; }
</style>
</head>
<body>
<h1>🏃 출근→퇴근 달리기</h1>

<label>캐릭터</label>
<input type="text" id="character" maxlength="4">
<div class="chars" id="quickChars"></div>

<div class="row">
  <div>
    <label>출근</label>
    <input type="time" id="start">
  </div>
  <div>
    <label>퇴근</label>
    <input type="time" id="end">
  </div>
</div>

<div class="row">
  <div>
    <label>트랙 칸 수</label>
    <input type="number" id="track" min="3" max="40">
  </div>
  <div>
    <label>갱신(ms)</label>
    <input type="number" id="intervalMs" min="200" step="100">
  </div>
</div>

<label class="check"><input type="checkbox" id="updateTitle"> 탭 제목에 표시</label>
<label class="check"><input type="checkbox" id="updateHash"> 주소창(해시)에 표시</label>

<div class="preview" id="preview">미리보기</div>
<div class="saved" id="saved"></div>
<div style="margin-top:10px; padding-top:8px; border-top:1px solid #eee;
            text-align:center; font-size:11px; color:#888;">
  제작자: 김정윤
</div>

<script src="popup.js"></script>
</body>
</html>
